<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #0A0A0A; font-family: 'Inter', sans-serif; color: #F5F5F5; position: relative; display: flex; }
  .glow-violet { position: absolute; bottom: -80px; left: -60px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 65%); }
  .glow-lime { position: absolute; bottom: -60px; right: 100px; width: 350px; height: 350px; border-radius: 50%; background: radial-gradient(circle, rgba(132,204,22,0.18) 0%, transparent 65%); }
  .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 48px 60px; position: relative; z-index: 1; }
  .sidebar { width: 260px; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; gap: 14px; padding: 60px 36px 60px 0; position: relative; z-index: 1; }
  .top-bar { position: absolute; top: 28px; left: 60px; right: 60px; display: flex; align-items: center; justify-content: space-between; z-index: 2; }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-text { font-size: 22px; font-weight: 700; color: #84cc16; }
  .badge { font-size: 13px; font-weight: 600; color: #84cc16; background: rgba(132,204,22,0.12); border: 1px solid rgba(132,204,22,0.3); padding: 4px 14px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; }
  .eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #84cc16; }
  .eyebrow-text { font-size: 18px; font-weight: 600; color: #84cc16; letter-spacing: 0.08em; text-transform: uppercase; }
  .headline { font-size: 80px; font-weight: 900; line-height: 1.05; letter-spacing: -0.03em; color: #F5F5F5; margin-bottom: 24px; max-width: 800px; }
  .headline .gradient { background: linear-gradient(90deg, #84cc16 0%, #a3e635 50%, #84cc16 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { font-size: 26px; color: #a3a3a3; font-weight: 500; letter-spacing: 0.02em; }
  .subtitle span { color: #737373; margin: 0 6px; }
  .pill { font-size: 15px; font-weight: 600; padding: 10px 20px; border-radius: 24px; white-space: nowrap; }
  .pill.lime { color: #84cc16; background: rgba(132,204,22,0.1); border: 1px solid rgba(132,204,22,0.35); }
  .pill.violet { color: #a78bfa; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.35); }
  .pill.neutral { color: #a3a3a3; background: rgba(255,255,255,0.05); border: 1px solid #333; }
  .bottom-bar { position: absolute; bottom: 24px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
  .url { font-size: 14px; color: #525252; font-weight: 500; }
  .tagline { font-size: 13px; color: #525252; font-style: italic; }
  .bottom-strip { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, #8b5cf6, #84cc16); opacity: 0.7; }
</style>
</head>
<body>
  <div class="glow-violet"></div>
  <div class="glow-lime"></div>
  <div class="bottom-strip"></div>
  <div class="top-bar">
    <div class="logo-area">
      <svg width="32" height="32" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" rx="96" fill="#000"/><rect x="118" y="210" width="276" height="170" rx="40" fill="none" stroke="#84cc16" stroke-width="32"/><circle cx="208" cy="295" r="18" fill="#84cc16"/><circle cx="304" cy="295" r="18" fill="#84cc16"/><rect x="244" y="150" width="24" height="70" rx="12" fill="#84cc16"/><circle cx="256" cy="130" r="38" fill="#84cc16"/><circle cx="256" cy="130" r="18" fill="#000"/></svg>
      <span class="logo-text">Agenticsis</span>
    </div>
    <div class="badge">Free Tool</div>
  </div>
  <div class="main">
    <div class="eyebrow"><div class="dot"></div><span class="eyebrow-text">Excalidraw Diagram Builder</span></div>
    <div class="headline">Draw. Edit.<br><span class="gradient">Export.</span></div>
    <div class="subtitle">Editable diagrams <span>·</span> No account <span>·</span> Excalidraw format <span>·</span> Free forever</div>
  </div>
  <div class="sidebar">
    <div class="pill lime">Fully Editable</div>
    <div class="pill violet">Excalidraw Compatible</div>
    <div class="pill neutral">Deploy to Your Vercel</div>
  </div>
  <div class="bottom-bar">
    <span class="url">agenticsis.top/tools</span>
    <span class="tagline">Free AI-powered tools by Agenticsis</span>
  </div>
</body>
</html>
