<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#000000"/>
  <!-- HUGE Node graph (violet gradient) — upper-left, dominant -->
  <line x1="140" y1="200" x2="350" y2="60" stroke="url(#grad)" stroke-width="36" stroke-linecap="round"/>
  <line x1="140" y1="200" x2="320" y2="420" stroke="url(#grad)" stroke-width="36" stroke-linecap="round"/>
  <line x1="350" y1="60" x2="320" y2="420" stroke="url(#grad)" stroke-width="28" stroke-linecap="round"/>
  <circle cx="140" cy="200" r="65" fill="url(#grad)"/>
  <circle cx="350" cy="60" r="50" fill="url(#grad)"/>
  <circle cx="320" cy="420" r="50" fill="url(#grad)"/>
  <!-- Robot (lime green, bottom-right, smaller) -->
  <rect x="280" y="330" width="190" height="120" rx="32" fill="none" stroke="#84cc16" stroke-width="24"/>
  <circle cx="345" cy="390" r="14" fill="#84cc16"/>
  <circle cx="415" cy="390" r="14" fill="#84cc16"/>
  <rect x="367" y="278" width="16" height="55" rx="8" fill="#84cc16"/>
